<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}eCommerce{% endblock %}</title>
</head>
<body>
<header>
    <h1><a href="/">eCommerce</a></h1>
    <nav>
        <a href="/">Home</a> | <a href="/cart/">Cart</a> |
        {% if user.is_authenticated %}
            Hello {{ user.username }} | <a href="/accounts/logout/">Logout</a>
        {% else %}
            <a href="/accounts/login/">Login</a> | <a href="/accounts/register/">Register</a>
        {% endif %}
    </nav>
</header>
<hr>
<main>
    {% if messages %}
        <ul class="messages">
            {% for m in messages %}
                <li>{{ m }}</li>
            {% endfor %}
        </ul>
    {% endif %}
    {% block content %}{% endblock %}
</main>
<hr>
<footer>
    <p>eCommerce demo</p>
</footer>
</body>
</html>
