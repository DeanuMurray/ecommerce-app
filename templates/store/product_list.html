{% extends 'base.html' %}
{% block title %}Products{% endblock %}
{% block content %}
<h2>Products</h2>
<ul>
  {% for p in products %}
    <li>
      <a href="{% url 'store:product_detail' p.pk %}">{{ p.name }}</a>
      — {{ p.store.name }} — ${{ p.price }} — stock: {{ p.stock }}
    </li>
  {% empty %}
    <li>No products yet.</li>
  {% endfor %}
</ul>
{% endblock %}
