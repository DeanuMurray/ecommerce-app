{% extends 'base.html' %}
{% block content %}
<h2>Your cart</h2>
{% if items %}
<table>
  <tr><th>Product</th><th>Qty</th><th>Subtotal</th></tr>
  {% for i in items %}
  <tr>
    <td>{{ i.product.name }}</td>
    <td>{{ i.quantity }}</td>
    <td>${{ i.subtotal }}</td>
  </tr>
  {% endfor %}
</table>
<p>Total: ${{ total }}</p>
<form action="{% url 'store:checkout' %}" method="post">{% csrf_token %}
  <button type="submit">Checkout</button>
</form>
{% else %}
<p>Your cart is empty.</p>
{% endif %}
{% endblock %}
